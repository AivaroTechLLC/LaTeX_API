services:
  api:
    build: .
    container_name: latex-compile-service-api
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      worker:
        condition: service_healthy
    user: "999:999"
    # Ensure host ./data ownership matches the container appuser.
    # If needed: sudo chown -R 999:999 ./data
    volumes:
      - ./data:/app/data
    command: ["sh", "-c", "gunicorn -k uvicorn.workers.UvicornWorker latex_compile_service.main:app --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-2} --log-level info"]
    restart: unless-stopped
    healthcheck:
      # Use the fast liveness probe so Docker can verify the container is healthy
      # without depending on Redis or latexmk readiness.
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  worker:
    build: .
    container_name: latex-compile-service-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    user: "999:999"
    # Ensure host ./data ownership matches the container appuser.
    # If needed: sudo chown -R 999:999 ./data
    volumes:
      - ./data:/app/data
    # Must be greater than COMPILE_TIMEOUT + task_time_limit buffer (currently 120 + 30 = 150s).
    # Update this value if COMPILE_TIMEOUT is increased in .env.
    stop_grace_period: 150s
    command: /opt/venv/bin/celery -A latex_compile_service.celery_app.celery worker --loglevel=info --concurrency=1 --without-gossip --without-mingle --without-heartbeat
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/venv/bin/celery -A latex_compile_service.celery_app.celery inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: latex-compile-service-redis
    # Bind Redis only to localhost for development tooling.
    # For pure production deployments this `ports:` mapping can be removed
    # entirely because api and worker access Redis over the internal Docker
    # bridge network by service name.
    ports:
      - '127.0.0.1:6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
